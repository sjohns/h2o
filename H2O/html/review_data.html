<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H2O — Review Packing Data</title>
    <link rel="stylesheet" href="css/admin_data.css">
</head>
<body data-role="review">
    <main class="page-shell">
        <header class="page-header">
            <div class="page-header-inner">
                <div>
                    <h1 class="page-title">H2O Packing Data</h1>
                    <p class="page-subtitle">Review current SKU data and preview proposed changes</p>
                </div>
                <nav class="page-nav">
                    <a href="/html/index.html">Packing Tool</a>
                </nav>
            </div>
        </header>

        <!-- Current Published Data -->
        <section class="tool-card">
            <div class="card-header">
                <div class="card-header-row">
                    <h2>Current Published Data</h2>
                    <div class="card-header-actions">
                        <a href="/admin/data/current_excel" class="btn btn-outline">Download Excel</a>
                    </div>
                </div>
            </div>
            <div id="currentDataContent" class="card-body">
                <p class="loading-msg">Loading&hellip;</p>
            </div>
        </section>

        <!-- Preview Changes -->
        <section class="tool-card">
            <div class="card-header">
                <h2>Preview Changes</h2>
                <p class="card-header-desc">Upload an Excel file to validate and preview changes. An admin must publish approved changes.</p>
            </div>
            <div class="card-body">
                <div class="field-group">
                    <label class="field-label" for="workbookFile">Excel file (.xlsx)</label>
                    <input id="workbookFile" type="file" accept=".xlsx" class="file-input">
                </div>
                <div class="btn-row">
                    <button id="validateBtn" data-action="validate" class="btn btn-validate" type="button">Validate</button>
                    <button id="previewBtn" data-action="preview" class="btn btn-preview" type="button">Preview Changes</button>
                </div>
            </div>
        </section>

        <!-- Results -->
        <section class="tool-card" id="resultsCard" hidden>
            <div class="card-header">
                <h2 id="resultsTitle">Results</h2>
            </div>
            <div id="resultsContent" class="card-body"></div>
        </section>
    </main>
    <script src="js/admin_data.js"></script>
</body>
</html>
