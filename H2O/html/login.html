<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H2O — Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light min-vh-100 d-flex align-items-center justify-content-center p-3">

    <div class="card shadow rounded-4 w-100" style="max-width:400px">
        <div class="card-header rounded-top-4 py-4 text-center text-white border-0"
             style="background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);">
            <h1 class="fw-bold mb-1" style="font-size:2rem; letter-spacing:-0.02em">H2O</h1>
            <p class="mb-0 small" style="color:#94a3b8">Packing Data Management</p>
        </div>
        <div class="card-body p-4">
            <div id="loginError" class="alert alert-danger d-none py-2 small" role="alert"></div>
            <div class="mb-3">
                <label class="form-label fw-semibold" for="username">Username</label>
                <input id="username" type="text" class="form-control" autocomplete="username">
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold" for="password">Password</label>
                <input id="password" type="password" class="form-control" autocomplete="current-password">
            </div>
            <button id="loginBtn" class="btn btn-primary w-100 fw-semibold" type="button">Sign In</button>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
