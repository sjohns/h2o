<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H2O Packing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <header class="py-3 px-4 text-white mb-4"
            style="background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);">
        <div>
            <span class="fw-bold fs-5">H2O Packing</span>
            <span class="ms-2 small" style="color:#94a3b8">Calculate optimal pipe packing</span>
        </div>
    </header>

    <main class="container-lg pb-5">

        <!-- SKU picker -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header py-3">
                <h2 class="h5 mb-0">Select Pipes</h2>
            </div>
            <div id="skuPickerBody" class="card-body">
                <p class="text-muted mb-0">Loading&hellip;</p>
            </div>
        </div>

        <!-- Order summary -->
        <div class="card mb-4 shadow-sm" id="orderCard" hidden>
            <div class="card-header py-3">
                <h2 class="h5 mb-0">Order Summary</h2>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-sm table-bordered mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>Description</th>
                                <th class="text-center" style="width:140px">Correct Amount</th>
                                <th style="width:120px"></th>
                                <th style="width:120px"></th>
                            </tr>
                        </thead>
                        <tbody id="orderTableTbody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Packing slip -->
        <div class="card shadow-sm" id="packingSlipCard" hidden>
            <div class="card-header py-3">
                <h2 class="h5 mb-0">Packing Slip</h2>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-sm table-bordered mb-0" id="orderTableDetail">
                        <thead></thead>
                        <tbody id="orderTableDetailTbody"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
